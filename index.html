<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Cloud Registration | Pink Edition</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}

body{
background:linear-gradient(135deg,#fce4ec,#fff1f1);
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
padding:40px;
}

.form-container{
background:white;
padding:30px;
border-radius:20px;
width:400px;
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border-radius:10px;
border:1px solid #ddd;
}

button{
padding:12px;
width:100%;
border:none;
border-radius:10px;
background:#f06292;
color:white;
cursor:pointer;
}

.search-input{
width:400px;
padding:12px;
border-radius:50px;
margin-bottom:20px;
border:2px solid pink;
}

.post{
background:white;
padding:15px;
margin-bottom:10px;
border-radius:15px;
width:400px;
display:flex;
justify-content:space-between;
align-items:center;
}

.like-btn{
background:#ffe4ec;
border:none;
padding:5px 10px;
border-radius:10px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="form-container">
<h2>Регистрация</h2>

<form id="feedbackForm">
<input type="text" id="userName" placeholder="Имя" required>
<input type="email" id="userEmail" placeholder="Email" required>
<button type="submit">Отправить</button>
<p id="message"></p>
</form>

<p id="onlineCount">Онлайн: 0</p>
</div>

<input type="text" id="searchInput" class="search-input" placeholder="Поиск...">

<div id="feed"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import {
getFirestore, collection, addDoc, query, orderBy, onSnapshot,
serverTimestamp, updateDoc, doc, increment, setDoc
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBUDDbQGURKwXY8dQ_qF-7v2n0NKEf62MA",
authDomain: "ramina243.firebaseapp.com",
projectId: "ramina243",
storageBucket: "ramina243.firebasestorage.app",
messagingSenderId: "923144008758",
appId: "1:923144008758:web:34347eba64da8be4369497"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentSearchTerm = "";
let firstLoad = true;

// ====== 1. ЗАПИСЬ ======
async function createNewPost(name, email){
await addDoc(collection(db,"requests"),{
name,
email,
likes:0,
timestamp:serverTimestamp()
});
}

// ====== 2. ЧТЕНИЕ ======
function loadRequests(){
const q = query(collection(db,"requests"),orderBy("timestamp","desc"));

onSnapshot(q,(snapshot)=>{
const feed = document.getElementById("feed");
feed.innerHTML="";

if(!firstLoad){
showNotification("🔥 Новый пользователь!");
}
firstLoad=false;

snapshot.forEach((docSnap)=>{
const data = docSnap.data();

if(data.name.toLowerCase().includes(currentSearchTerm.toLowerCase())){
feed.innerHTML += `
<div class="post">
<div>
<b>${data.name}</b><br>
<small>${data.email}</small>
</div>
<button class="like-btn" onclick="addLikeToPost('${docSnap.id}',this)">
💖 ${data.likes || 0}
</button>
</div>`;
}
});
});
}

// ====== ПОИСК ======
document.getElementById("searchInput").addEventListener("input",(e)=>{
currentSearchTerm = e.target.value;
loadRequests();
});

// ====== ФОРМА ======
document.getElementById("feedbackForm").addEventListener("submit",async(e)=>{
e.preventDefault();

const name = document.getElementById("userName").value;
const email = document.getElementById("userEmail").value;

await createNewPost(name,email);

document.getElementById("feedbackForm").reset();
showNotification("✅ Сохранено!");
});

// ====== ЛАЙК ======
window.addLikeToPost = async(id,btn)=>{
btn.style.transform="scale(1.3)";
setTimeout(()=>btn.style.transform="scale(1)",200);

const ref = doc(db,"requests",id);
await updateDoc(ref,{likes:increment(1)});
};

// ====== УВЕДОМЛЕНИЕ ======
function showNotification(text){
const msg = document.getElementById("message");
msg.innerText = text;
setTimeout(()=>msg.innerText="",3000);
}

// ====== ОНЛАЙН ======
const userId = Date.now().toString();

async function setUserOnline(){
await setDoc(doc(db,"onlineUsers",userId),{
active:true,
lastSeen:serverTimestamp()
});
}

function trackOnline(){
const q = query(collection(db,"onlineUsers"));
onSnapshot(q,(snapshot)=>{
document.getElementById("onlineCount").innerText =
"Онлайн: " + snapshot.size;
});
}

setUserOnline();
trackOnline();

// ====== СТАРТ ======
loadRequests();

</script>

</body>
</html>
