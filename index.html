<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Mini Instagram App</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:#fafafa;
display:flex;
flex-direction:column;
align-items:center;
}

/* HEADER */
.header{
width:100%;
background:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
position:sticky;
top:0;
}

.logo{
font-weight:bold;
font-size:20px;
}

/* BUTTON */
button{
border:none;
background:#0095f6;
color:white;
padding:8px 15px;
border-radius:8px;
cursor:pointer;
}

/* POST */
.post{
width:400px;
background:white;
margin:20px 0;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
overflow:hidden;
}

.post-header{
display:flex;
align-items:center;
padding:10px;
}

.avatar{
width:40px;
height:40px;
border-radius:50%;
margin-right:10px;
}

.post-content{
padding:10px;
}

.like-btn{
background:none;
border:none;
font-size:20px;
cursor:pointer;
}

.search{
margin:20px;
padding:10px;
width:380px;
border-radius:20px;
border:1px solid #ddd;
}
</style>
</head>

<body>

<div class="header">
<div class="logo">MiniInstagram</div>
<button id="loginBtn">Войти через Google</button>
</div>

<input type="text" id="search" class="search" placeholder="Поиск...">

<div id="feed"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";

import {
getFirestore, collection, addDoc, query, orderBy,
onSnapshot, serverTimestamp, doc, updateDoc, increment
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

import {
getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

// CONFIG
const firebaseConfig = {
apiKey: "AIzaSyBUDDbQGURKwXY8dQ_qF-7v2n0NKEf62MA",
authDomain: "ramina243.firebaseapp.com",
projectId: "ramina243",
storageBucket: "ramina243.firebasestorage.app",
messagingSenderId: "923144008758",
appId: "1:923144008758:web:34347eba64da8be4369497"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let currentUser = null;
let searchText = "";

// ====== LOGIN ======
document.getElementById("loginBtn").onclick = async () => {
const provider = new GoogleAuthProvider();
await signInWithPopup(auth, provider);
};

// ====== AUTH STATE ======
onAuthStateChanged(auth, (user)=>{
if(user){
currentUser = user;
document.getElementById("loginBtn").innerText = user.displayName;
}
});

// ====== ADD POST (по клику на страницу) ======
document.body.addEventListener("dblclick", async ()=>{
if(!currentUser){
alert("Сначала войди!");
return;
}

await addDoc(collection(db,"posts"),{
name: currentUser.displayName,
avatar: currentUser.photoURL,
likes: 0,
timestamp: serverTimestamp()
});
});

// ====== LOAD POSTS ======
function loadPosts(){
const q = query(collection(db,"posts"),orderBy("timestamp","desc"));

onSnapshot(q,(snapshot)=>{
const feed = document.getElementById("feed");
feed.innerHTML="";

snapshot.forEach(docSnap=>{
const data = docSnap.data();

if(data.name.toLowerCase().includes(searchText.toLowerCase())){

feed.innerHTML += `
<div class="post">
<div class="post-header">
<img src="${data.avatar}" class="avatar">
<b>${data.name}</b>
</div>

<div class="post-content">
<button class="like-btn" onclick="likePost('${docSnap.id}',this)">
❤️ ${data.likes || 0}
</button>
</div>
</div>`;
}
});
});
}

// ====== LIKE ======
window.likePost = async(id,btn)=>{
btn.style.transform="scale(1.3)";
setTimeout(()=>btn.style.transform="scale(1)",200);

const ref = doc(db,"posts",id);
await updateDoc(ref,{likes:increment(1)});
};

// ====== SEARCH ======
document.getElementById("search").addEventListener("input",(e)=>{
searchText = e.target.value;
loadPosts();
});

// START
loadPosts();

</script>

</body>
</html>
