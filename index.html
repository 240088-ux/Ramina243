<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Мой облачный проект</title>

<style>

body{
font-family:sans-serif;
display:flex;
justify-content:center;
padding:50px;
background:#f4f4f9;
}

.form-container{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
width:300px;
}

input{
width:100%;
padding:10px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:10px;
background:#f4b400;
border:none;
color:white;
font-weight:bold;
border-radius:5px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="form-container">

<h3>Отправить заявку</h3>

<form id="feedbackForm">

<input type="text" id="userName" placeholder="Ваше имя" required>

<input type="email" id="userEmail" placeholder="Ваш Email" required>

<button type="submit">Отправить в облако</button>

</form>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBUDDbQGURKwXY8dQ_qF-7v2n0NKEf62MA",
  authDomain: "ramina243.firebaseapp.com",
  projectId: "ramina243",
  storageBucket: "ramina243.firebasestorage.app",
  messagingSenderId: "923144008758",
  appId: "1:923144008758:web:34347eba64da8be4369497",
  measurementId: "G-316VTH9LFZ"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

document.getElementById("feedbackForm").addEventListener("submit", async (e) => {

e.preventDefault();

const nameInput = document.getElementById("userName").value;
const emailInput = document.getElementById("userEmail").value;

try{

await addDoc(collection(db,"requests"),{

name:nameInput,
email:emailInput,
timestamp:new Date()

});

alert("Данные отправлены в Firebase");

document.getElementById("feedbackForm").reset();

}catch(error){

alert("Ошибка отправки");

}

});

</script>

</body>
</html>
