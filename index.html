<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Cloud Pink | Ultra Edition</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #fff0f5; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        .header-auth { width: 100%; max-width: 500px; display: flex; justify-content: flex-end; margin-bottom: 20px; }
        .btn-google { padding: 10px 20px; border: 2px solid #f06292; background: white; color: #f06292; border-radius: 50px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-google:hover { background: #fce4ec; }

        .glass-container { 
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); 
            padding: 30px; border-radius: 25px; width: 100%; max-width: 450px; 
            box-shadow: 0 10px 30px rgba(255, 182, 193, 0.3); border: 1px solid white; text-align: center;
        }

        h2 { color: #ec407a; margin-bottom: 20px; font-weight: 300; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 2px solid #f8bbd0; border-radius: 12px; outline: none; }
        
        .btn-send { width: 100%; padding: 15px; border: none; border-radius: 12px; background: #f06292; color: white; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-send:hover { background: #d81b60; }

        #feed { width: 100%; max-width: 500px; margin-top: 30px; }
        .post { background: white; padding: 15px; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); display: flex; align-items: center; gap: 15px; }
        .post img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid #fce4ec; }
        .post-content { flex-grow: 1; }
        .post-name { font-weight: bold; color: #ec407a; font-size: 14px; }
        .post-text { font-size: 13px; color: #666; margin-top: 3px; }
    </style>
</head>
<body>

    <div class="header-auth">
        <div id="userProfile" style="display:none; align-items:center; gap:10px; background:white; padding:5px 15px; border-radius:50px; box-shadow:0 2px 5px rgba(0,0,0,0.1);">
            <img id="myAvatar" src="" style="width:30px; border-radius:50%;">
            <span id="myName" style="font-size:12px; font-weight:bold;"></span>
            <button onclick="location.reload()" style="border:none; background:none; color:red; cursor:pointer; font-size:10px;">Выйти</button>
        </div>
        <button class="btn-google" id="loginBtn">Войти через Google</button>
    </div>

    <div class="glass-container">
        <h2>Подписаться на Облако</h2>
        <input type="text" id="msgInput" placeholder="Введите ваше сообщение или статус">
        <button class="btn-send" id="sendBtn">Подписаться</button>
        <p id="status" style="font-size:12px; margin-top:10px; color:#ec407a;"></p>
    </div>

    <div id="feed"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
        import { getAuth, signInWithRedirect, getRedirectResult, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBUDDbQGURKwXY8dQ_qF-7v2n0NKEf62MA",
            authDomain: "ramina243.firebaseapp.com",
            projectId: "ramina243",
            storageBucket: "ramina243.firebasestorage.app",
            messagingSenderId: "923144008758",
            appId: "1:923144008758:web:34347eba64da8be4369497"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        let currentUser = null;

        // Вход через Redirect (самый надежный)
        document.getElementById('loginBtn').onclick = () => signInWithRedirect(auth, provider);

        // Обработка входа
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('loginBtn').style.display = 'none';
                document.getElementById('userProfile').style.display = 'flex';
                document.getElementById('myAvatar').src = user.photoURL;
                document.getElementById('myName').innerText = user.displayName;
            }
        });

        // Отправка (Подписка)
        document.getElementById('sendBtn').onclick = async () => {
            if (!currentUser) {
                alert("Сначала войдите через Google!");
                return;
            }
            const text = document.getElementById('msgInput').value;
            if (!text) return;

            await addDoc(collection(db, "requests"), {
                name: currentUser.displayName,
                email: currentUser.email,
                photo: currentUser.photoURL,
                message: text,
                timestamp: serverTimestamp()
            });
            document.getElementById('msgInput').value = "";
            document.getElementById('status').innerText = "Вы успешно подписаны! ✨";
        };

        // Лента в реальном времени
        const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));
        onSnapshot(q, (snap) => {
            const feed = document.getElementById('feed');
            feed.innerHTML = "";
            snap.forEach(doc => {
                const data = doc.data();
                feed.innerHTML += `
                    <div class="post">
                        <img src="${data.photo || 'https://via.placeholder.com/40'}">
                        <div class="post-content">
                            <div class="post-name">${data.name}</div>
                            <div class="post-text">${data.message}</div>
                        </div>
                        <div style="font-size:10px; color:#ccc;">${data.timestamp?.toDate().toLocaleTimeString() || ''}</div>
                    </div>`;
            });
        });
    </script>
</body>
</html>
