<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Cloud Registration | Pink Edition</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body { 
            background: linear-gradient(135deg, #fce4ec, #fff1f1); 
            min-height: 100vh; display: flex; flex-direction: column; 
            align-items: center; padding: 40px 20px; color: #5d4037; 
        }

        .form-container { 
            background: rgba(255, 255, 255, 0.7); 
            backdrop-filter: blur(10px); 
            padding: 35px; border-radius: 25px; 
            width: 100%; max-width: 400px; 
            border: 1px solid rgba(255, 255, 255, 0.4); 
            box-shadow: 0 10px 30px rgba(255, 182, 193, 0.3); 
            text-align: center; margin-bottom: 20px; 
        }

        /* Стиль поля поиска */
        .search-container {
            width: 100%;
            max-width: 400px;
            margin-bottom: 30px;
        }

        .search-input {
            width: 100%;
            padding: 12px 20px;
            border-radius: 50px;
            border: 2px solid rgba(255, 182, 193, 0.5);
            background: white;
            outline: none;
            transition: 0.3s;
            font-size: 14px;
            color: #ec407a;
        }

        .search-input:focus {
            border-color: #f06292;
            box-shadow: 0 0 10px rgba(240, 98, 146, 0.2);
        }

        h2 { margin-bottom: 25px; color: #ec407a; font-weight: 300; letter-spacing: 1px; }

        input { 
            width: 100%; padding: 14px; margin-bottom: 18px; 
            border: 2px solid rgba(255, 182, 193, 0.3); 
            border-radius: 12px; font-size: 14px; 
            background: rgba(255, 255, 255, 0.9); transition: 0.3s; 
        }

        input:focus { border-color: #f06292; outline: none; }

        button#submitBtn { 
            width: 100%; padding: 15px; border: none; border-radius: 12px; 
            background: linear-gradient(45deg, #ff80ab, #f06292); 
            color: white; font-size: 16px; font-weight: bold; cursor: pointer; 
            transition: 0.3s transform ease, 0.3s box-shadow ease; 
        }

        button#submitBtn:hover { transform: scale(1.03); box-shadow: 0 5px 15px rgba(240, 98, 146, 0.4); }

        #feed { width: 100%; max-width: 450px; }

        .post { 
            background: white; padding: 20px; border-radius: 18px; 
            margin-bottom: 18px; box-shadow: 0 5px 15px rgba(255, 182, 193, 0.2); 
            display: flex; align-items: center; gap: 15px; animation: slideIn 0.4s ease; 
        }
        
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .avatar { 
            width: 50px; height: 50px; border-radius: 50%; 
            background: #f8bbd0; color: white; display: flex; 
            justify-content: center; align-items: center; font-size: 18px; font-weight: bold; 
        }

        .post-info { flex-grow: 1; }
        .post-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .post-name { font-weight: bold; color: #ec407a; }
        .post-time { font-size: 11px; color: #bbb; }
        
        .like-btn { 
            margin-top: 10px; padding: 6px 12px; border: none; 
            border-radius: 10px; background: #fff1f1; color: #f06292; 
            cursor: pointer; font-size: 13px; font-weight: bold; 
        }
        .like-btn:hover { background: #fce4ec; }

        #message { margin-top: 15px; color: #ec407a; font-size: 14px; }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>Регистрация в Облаке</h2>
        <form id="feedbackForm">
            <input type="text" id="userName" placeholder="Как вас зовут?" required>
            <input type="email" id="userEmail" placeholder="Ваш Email" required>
            <button type="submit" id="submitBtn">Подписаться</button>
            <p id="message"></p>
        </form>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" class="search-input" placeholder="🔍 Поиск по имени...">
    </div>

    <div id="feed"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { 
            getFirestore, collection, addDoc, query, orderBy, onSnapshot, 
            serverTimestamp, updateDoc, doc, increment 
        } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBUDDbQGURKwXY8dQ_qF-7v2n0NKEf62MA",
            authDomain: "ramina243.firebaseapp.com",
            projectId: "ramina243",
            storageBucket: "ramina243.firebasestorage.app",
            messagingSenderId: "923144008758",
            appId: "1:923144008758:web:34347eba64da8be4369497"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentSearchTerm = "";

        // 1. ФУНКЦИЯ ЗАПИСИ
        async function createNewPost(name, email) {
            try {
                await addDoc(collection(db, "requests"), {
                    name: name,
                    email: email,
                    likes: 0,
                    timestamp: serverTimestamp()
                });
                return true;
            } catch (e) {
                console.error("Ошибка записи:", e);
                return false;
            }
        }

        // 2. ФУНКЦИЯ ЧТЕНИЯ С ФИЛЬТРАЦИЕЙ
        function loadRequests() {
            const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));
            onSnapshot(q, (snapshot) => {
                const feed = document.getElementById("feed");
                feed.innerHTML = "";
                
                snapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    
                    // Логика поиска: проверяем, содержит ли имя текст из поиска
                    if (data.name.toLowerCase().includes(currentSearchTerm.toLowerCase())) {
                        const initials = data.name.substring(0, 2).toUpperCase();
                        const time = data.timestamp?.toDate().toLocaleTimeString() || "...";
                        
                        feed.innerHTML += `
                            <div class="post">
                                <div class="avatar">${initials}</div>
                                <div class="post-info">
                                    <div class="post-header">
                                        <span class="post-name">${data.name}</span>
                                        <span class="post-time">${time}</span>
                                    </div>
                                    <p style="font-size: 13px; color: #888;">${data.email}</p>
                                    <button class="like-btn" onclick="addLikeToPost('${docSnap.id}')">
                                        💖 ${data.likes || 0}
                                    </button>
                                </div>
                            </div>`;
                    }
                });
            });
        }

        // Слушатель для поля поиска
        document.getElementById("searchInput").addEventListener("input", (e) => {
            currentSearchTerm = e.target.value;
            loadRequests(); // Перезапускаем отображение при вводе
        });

        // Логика формы
        document.getElementById("feedbackForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const btn = document.getElementById("submitBtn");
            const name = document.getElementById("userName").value;
            const email = document.getElementById("userEmail").value;
            
            btn.innerText = "Загрузка...";
            const success = await createNewPost(name, email);
            if (success) {
                document.getElementById("feedbackForm").reset();
                document.getElementById("message").innerText = "Готово! Данные сохранены.";
            }
            btn.innerText = "Подписаться";
        });

        window.addLikeToPost = async (id) => {
            const docRef = doc(db, "requests", id);
            await updateDoc(docRef, { likes: increment(1) });
        };

        loadRequests();
    </script>
</body>
</html>
