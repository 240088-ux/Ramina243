<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Cloud Ultra Pink | Real-time & DM</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #fff1f1; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; color: #5d4037; }
        
        .auth-bar { width: 100%; max-width: 600px; display: flex; justify-content: space-between; align-items: center; background: white; padding: 15px 25px; border-radius: 50px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(255,182,193,0.3); }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .user-photo { width: 40px; height: 40px; border-radius: 50%; border: 2px solid #ff80ab; }
        .login-btn, .logout-btn { padding: 8px 20px; border: none; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .login-btn { background: #ff80ab; color: white; }
        .logout-btn { background: #eee; color: #888; font-size: 11px; }

        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 10px 25px; border: none; border-radius: 15px; background: white; cursor: pointer; color: #f06292; font-weight: bold; }
        .tab-btn.active { background: #f06292; color: white; }

        .content-section { width: 100%; max-width: 500px; display: none; }
        .content-section.active { display: block; }

        .dm-container { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .user-list { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 15px; margin-bottom: 15px; border-bottom: 1px solid #fff1f1; }
        .user-item { text-align: center; cursor: pointer; min-width: 70px; }
        .user-item img { width: 50px; height: 50px; border-radius: 50%; border: 2px solid transparent; padding: 2px; }
        .user-item.selected img { border-color: #ff80ab; }
        .user-item p { font-size: 10px; margin-top: 5px; color: #f06292; font-weight: bold; }

        .chat-box { height: 300px; overflow-y: auto; background: #fff9fb; border-radius: 15px; padding: 15px; margin-bottom: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 10px 15px; border-radius: 15px; font-size: 14px; word-wrap: break-word; }
        .msg.sent { align-self: flex-end; background: #ff80ab; color: white; border-bottom-right-radius: 2px; }
        .msg.received { align-self: flex-start; background: #fce4ec; color: #5d4037; border-bottom-left-radius: 2px; }

        .msg-input-area { display: flex; gap: 10px; }
        .msg-input-area input { flex: 1; padding: 12px; border-radius: 10px; border: 2px solid #fff1f1; outline: none; }
        .send-btn { background: #ff80ab; border: none; color: white; width: 45px; border-radius: 10px; cursor: pointer; }

        .post { background: white; padding: 20px; border-radius: 20px; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.03); }
        .post-header { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
        .post-comment { background: #fff9fb; padding: 12px; border-radius: 12px; font-size: 14px; margin: 10px 0; }
        .post-img { width: 100%; border-radius: 15px; margin-top: 10px; }
        .like-btn { border: none; background: #fff1f1; color: #f06292; padding: 8px 15px; border-radius: 10px; font-weight: bold; cursor: pointer; }

        .form-box { background: white; padding: 25px; border-radius: 20px; margin-bottom: 25px; width: 100%; }
        input[type="text"] { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 2px solid #fff1f1; }
        .submit-btn { width: 100%; padding: 15px; background: #f06292; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="auth-bar">
        <div id="userInfo" style="display:none;" class="user-info">
            <img id="userPhoto" class="user-photo">
            <span id="userName"></span>
            <button class="logout-btn" id="logoutBtn">Выйти</button>
        </div>
        <button class="login-btn" id="loginBtn">Войти через Google</button>
        <div id="onlineStatus" style="font-size: 12px; color: #ff80ab;">• Online: 1</div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('feedTab')">Лента</button>
        <button class="tab-btn" onclick="switchTab('dmTab')">Сообщения (DM)</button>
    </div>

    <div id="feedTab" class="content-section active">
        <div class="form-box" id="postForm" style="display:none;">
            <input type="text" id="userComment" placeholder="Что у вас нового?">
            <input type="text" id="postImage" placeholder="Ссылка на фото (URL)">
            <button class="submit-btn" id="sendPostBtn">Опубликовать</button>
        </div>
        <div id="feed"></div>
    </div>

    <div id="dmTab" class="content-section">
        <div class="dm-container">
            <div id="userList" class="user-list"></div>
            <div id="chatWindow" style="display:none;">
                <h4 id="chatWithTitle" style="margin-bottom:10px; color:#f06292; font-size:14px;">Чат с: ...</h4>
                <div class="chat-box" id="chatBox"></div>
                <div class="msg-input-area">
                    <input type="text" id="msgInput" placeholder="Введите сообщение...">
                    <button class="send-btn" id="sendMsgBtn">➤</button>
                </div>
            </div>
            <p id="noSelectMsg" style="text-align:center; color:#ccc; padding:20px;">Выберите собеседника выше</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, updateDoc, doc, increment, setDoc, where } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBUDDbQGURKwXY8dQ_qF-7v2n0NKEf62MA",
            authDomain: "ramina243.firebaseapp.com",
            projectId: "ramina243",
            storageBucket: "ramina243.firebasestorage.app",
            messagingSenderId: "923144008758",
            appId: "1:923144008758:web:34347eba64da8be4369497"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        let selectedUserId = null;
        let chatUnsubscribe = null;

        window.switchTab = (id) => {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById("loginBtn").style.display = "none";
                document.getElementById("userInfo").style.display = "flex";
                document.getElementById("postForm").style.display = "block";
                document.getElementById("userPhoto").src = user.photoURL;
                document.getElementById("userName").innerText = user.displayName;

                await setDoc(doc(db, "users", user.uid), {
                    uid: user.uid,
                    name: user.displayName,
                    photo: user.photoURL,
                    lastSeen: serverTimestamp()
                }, { merge: true });
                loadUsers();
            } else {
                document.getElementById("loginBtn").style.display = "block";
                document.getElementById("userInfo").style.display = "none";
                document.getElementById("postForm").style.display = "none";
            }
        });

        document.getElementById("loginBtn").onclick = () => signInWithPopup(auth, provider);
        document.getElementById("logoutBtn").onclick = () => signOut(auth);

        // --- ЛЕНТА ---
        document.getElementById("sendPostBtn").onclick = async () => {
            const comment = document.getElementById("userComment").value;
            const image = document.getElementById("postImage").value;
            if(!comment) return;

            await addDoc(collection(db, "requests"), {
                name: auth.currentUser.displayName,
                avatar: auth.currentUser.photoURL,
                comment: comment,
                image: image,
                likes: 0,
                timestamp: serverTimestamp()
            });
            document.getElementById("userComment").value = "";
            document.getElementById("postImage").value = "";
        };

        onSnapshot(query(collection(db, "requests"), orderBy("timestamp", "desc")), (snap) => {
            const feed = document.getElementById("feed");
            feed.innerHTML = "";
            snap.forEach(d => {
                const data = d.data();
                feed.innerHTML += `
                    <div class="post">
                        <div class="post-header">
                            <img src="${data.avatar}" style="width:30px; border-radius:50%;">
                            <span style="font-weight:bold; color:#f06292; font-size:13px;">${data.name}</span>
                        </div>
                        <div class="post-comment">${data.comment || "..."}</div>
                        ${data.image ? `<img src="${data.image}" class="post-img">` : ""}
                        <button class="like-btn" onclick="likePost('${d.id}')">💖 ${data.likes || 0}</button>
                    </div>
                `;
            });
        });

        window.likePost = (id) => updateDoc(doc(db, "requests", id), { likes: increment(1) });

        // --- ЛИЧНЫЕ СООБЩЕНИЯ ---
        function loadUsers() {
            onSnapshot(collection(db, "users"), (snap) => {
                const list = document.getElementById("userList");
                list.innerHTML = "";
                snap.forEach(d => {
                    const user = d.data();
                    if(user.uid === auth.currentUser?.uid) return;
                    
                    const div = document.createElement("div");
                    div.className = `user-item ${selectedUserId === user.uid ? 'selected' : ''}`;
                    div.innerHTML = `<img src="${user.photo}"><p>${user.name.split(" ")[0]}</p>`;
                    div.onclick = () => openChat(user);
                    list.appendChild(div);
                });
            });
        }

        function openChat(targetUser) {
            selectedUserId = targetUser.uid;
            document.getElementById("noSelectMsg").style.display = "none";
            document.getElementById("chatWindow").style.display = "block";
            document.getElementById("chatWithTitle").innerText = "Чат с: " + targetUser.name;
            loadMessages(targetUser.uid);
            loadUsers(); 
        }

        function loadMessages(targetUid) {
            if(chatUnsubscribe) chatUnsubscribe();
            
            // Создаем единый ID чата для обоих участников
            const myId = auth.currentUser.uid;
            const chatId = myId < targetUid ? myId + "_" + targetUid : targetUid + "_" + myId;

            const q = query(
                collection(db, "direct_messages"),
                where("chatId", "==", chatId),
                orderBy("timestamp", "asc")
            );

            chatUnsubscribe = onSnapshot(q, (snap) => {
                const box = document.getElementById("chatBox");
                box.innerHTML = "";
                snap.forEach(d => {
                    const m = d.data();
                    const isMine = m.senderId === myId;
                    box.innerHTML += `<div class="msg ${isMine ? 'sent' : 'received'}">${m.text}</div>`;
                });
                box.scrollTop = box.scrollHeight;
            }, (error) => {
                console.error("Ошибка чата:", error);
                // Если видишь эту ошибку, кликни по ссылке в консоли для создания индекса
            });
        }

        document.getElementById("sendMsgBtn").onclick = async () => {
            const input = document.getElementById("msgInput");
            const text = input.value.trim();
            if(!text || !selectedUserId) return;

            const myId = auth.currentUser.uid;
            const targetId = selectedUserId;
            // Всегда одинаковый ID чата для пары
            const chatId = myId < targetId ? myId + "_" + targetId : targetId + "_" + myId;

            await addDoc(collection(db, "direct_messages"), {
                chatId: chatId,
                senderId: myId,
                receiverId: targetId,
                text: text,
                timestamp: serverTimestamp()
            });
            input.value = "";
        };

    </script>
</body>
</html>
