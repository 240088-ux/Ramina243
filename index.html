<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Облачная регистрация</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#667eea,#764ba2);
}

.form-container{
background:white;
padding:35px;
border-radius:15px;
width:320px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
text-align:center;
}

h2{
margin-bottom:20px;
color:#333;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:8px;
font-size:14px;
transition:0.3s;
}

input:focus{
border-color:#667eea;
outline:none;
box-shadow:0 0 5px rgba(102,126,234,0.5);
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:linear-gradient(135deg,#ffb347,#ffcc33);
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.success{
margin-top:10px;
color:green;
font-size:14px;
}

</style>
</head>

<body>

<div class="form-container">

<h2>Регистрация</h2>

<form id="feedbackForm">

<input type="text" id="userName" placeholder="Введите имя" required>

<input type="email" id="userEmail" placeholder="Введите Email" required>

<button type="submit">Отправить</button>

<p class="success" id="message"></p>

</form>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBUDDbQGURKwXY8dQ_qF-7v2n0NKEf62MA",
  authDomain: "ramina243.firebaseapp.com",
  projectId: "ramina243",
  storageBucket: "ramina243.firebasestorage.app",
  messagingSenderId: "923144008758",
  appId: "1:923144008758:web:34347eba64da8be4369497",
  measurementId: "G-316VTH9LFZ"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

document.getElementById("feedbackForm").addEventListener("submit", async (e)=>{

e.preventDefault();

const nameInput=document.getElementById("userName").value;
const emailInput=document.getElementById("userEmail").value;

try{

await addDoc(collection(db,"requests"),{
name:nameInput,
email:emailInput,
timestamp:new Date()
});

document.getElementById("message").innerText="Данные успешно отправлены!";
document.getElementById("feedbackForm").reset();

}catch(error){

document.getElementById("message").innerText="Ошибка отправки";

}

});

</script>

</body>
</html>
