<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Облачная регистрация — Финальная версия</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { 
            min-height: 100vh; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; 
            background: linear-gradient(135deg, #667eea, #764ba2); padding: 20px; 
        }
        .form-container { 
            background: white; padding: 30px; border-radius: 15px; 
            width: 350px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); 
            text-align: center; margin-bottom: 20px; 
        }
        h2 { margin-bottom: 20px; color: #333; }
        input { 
            width: 100%; padding: 12px; margin-bottom: 15px; 
            border: 1px solid #ddd; border-radius: 8px; font-size: 14px; 
        }
        button#submitBtn { 
            width: 100%; padding: 12px; border: none; border-radius: 8px; 
            background: linear-gradient(135deg, #ffb347, #ffcc33); 
            color: white; font-size: 16px; font-weight: bold; cursor: pointer; 
        }
        #feed { width: 100%; max-width: 400px; }
        .post { 
            background: white; padding: 15px; border-radius: 10px; 
            margin-top: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); 
        }
        .time { font-size: 10px; color: #888; float: right; }
        .like-btn { 
            margin-top: 10px; padding: 5px 10px; border: none; 
            border-radius: 5px; background: #f0f0f0; cursor: pointer; 
        }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>Регистрация</h2>
        <form id="feedbackForm">
            <input type="text" id="userName" placeholder="Введите имя" required>
            <input type="email" id="userEmail" placeholder="Введите Email" required>
            <button type="submit" id="submitBtn">Отправить в облако</button>
        </form>
    </div>

    <div id="feed"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { 
            getFirestore, collection, addDoc, query, orderBy, onSnapshot, 
            serverTimestamp, updateDoc, doc, increment 
        } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        // ТВОИ КЛЮЧИ (уже подставлены из твоего проекта)
        const firebaseConfig = {
            apiKey: "AIzaSyBUDDbQGURKwXY8dQ_qF-7v2n0NKEf62MA",
            authDomain: "ramina243.firebaseapp.com",
            projectId: "ramina243",
            storageBucket: "ramina243.firebasestorage.app",
            messagingSenderId: "923144008758",
            appId: "1:923144008758:web:34347eba64da8be4369497"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- САМОСТОЯТЕЛЬНАЯ РАБОТА: ДВЕ ФУНКЦИИ ---

        // 1. ФУНКЦИЯ ЗАПИСИ (Create)
        async function createNewRequest(name, email) {
            try {
                await addDoc(collection(db, "requests"), {
                    name: name,
                    email: email,
                    likes: 0,
                    timestamp: serverTimestamp()
                });
                return true;
            } catch (e) {
                console.error("Ошибка записи:", e);
                return false;
            }
        }

        // 2. ФУНКЦИЯ ЧТЕНИЯ (Read - Realtime)
        function startLiveUpdates() {
            const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));
            onSnapshot(q, (snapshot) => {
                const feed = document.getElementById("feed");
                feed.innerHTML = "";
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const time = data.timestamp?.toDate().toLocaleTimeString() || '...';
                    feed.innerHTML += `
                        <div class="post">
                            <span class="time">${time}</span>
                            <strong>${data.name}</strong>
                            <p style="font-size: 13px;">${data.email}</p>
                            <button class="like-btn" onclick="addLike('${doc.id}')">👍 ${data.likes || 0}</button>
                        </div>`;
                });
            });
        }

        // --- ЛОГИКА ИНТЕРФЕЙСА ---

        // Обработка формы
        document.getElementById("feedbackForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const name = document.getElementById("userName").value;
            const email = document.getElementById("userEmail").value;
            
            const success = await createNewRequest(name, email);
            if (success) {
                document.getElementById("feedbackForm").reset();
            } else {
                alert("Ошибка при отправке!");
            }
        });

        // Функция для лайков (через window, чтобы работала в HTML)
        window.addLike = async (id) => {
            const docRef = doc(db, "requests", id);
            await updateDoc(docRef, { likes: increment(1) });
        };

        // Запуск чтения данных при загрузке страницы
        startLiveUpdates();

    </script>
</body>
</html>
