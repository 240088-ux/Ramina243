<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Монитор статусов</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 500px; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; }
        .my-profile { background: #fafafa; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #eee; }
        .buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        button { padding: 10px; border: none; border-radius: 8px; cursor: pointer; color: white; font-weight: bold; transition: opacity 0.2s; }
        button:hover { opacity: 0.8; }
        .btn-study { background: #27ae60; }
        .btn-coffee { background: #f1c40f; color: #333; }
        .btn-game { background: #2980b9; }
        .btn-home { background: #7f8c8d; }
        
        .user-item { display: flex; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; margin-right: 15px; border: 2px solid white; box-shadow: 0 0 5px rgba(0,0,0,0.1); }
        .user-info b { display: block; color: #2c3e50; }
        .user-info span { font-size: 0.9em; color: #7f8c8d; }
    </style>
</head>
<body>

<div class="container">
    <h2>Мой профиль</h2>
    <div class="my-profile">
        <p id="myInfo">Загрузка профиля...</p>
        <div class="buttons">
            <button class="btn-study" onclick="changeStatus('📚 Учусь', '#27ae60')">📚 Учусь</button>
            <button class="btn-coffee" onclick="changeStatus('☕ Кофе', '#f1c40f')">☕ Кофе</button>
            <button class="btn-game" onclick="changeStatus('🎮 В игре', '#2980b9')">🎮 В игре</button>
            <button class="btn-home" onclick="changeStatus('🏠 Дома', '#7f8c8d')">🏠 Дома</button>
        </div>
    </div>

    <hr>
    <h2>Монитор группы</h2>
    <div id="groupList">
        </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    // 1. Сначала объявляем константы (проверьте, что они не дублируются выше)
    const SUPABASE_URL = 'https://aecurveycefurzgkloaq.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_1N6vKLVRSpJeWya6w7Aaig_-w5RA8yY';
    const MY_USER_ID = '117f40da-c90e-4a98-9289-9bdd20e4c855';

    // 2. Инициализируем клиент (только один раз!)
    // Используем window.supabase, чтобы избежать конфликта имен
    const sb_client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // 3. Функция смены статуса
    async function changeStatus(statusText, statusColor) {
        console.log("Меняем статус на:", statusText);
        const { error } = await sb_client
            .from('profiles')
            .update({ status: statusText, color: statusColor })
            .eq('id', MY_USER_ID);

        if (error) {
            console.error("Ошибка обновления:", error);
            alert("Ошибка при обновлении статуса!");
        } else {
            fetchGroup();
        }
    }

    // 4. Функция загрузки данных группы
    async function fetchGroup() {
        const { data, error } = await sb_client
            .from('profiles')
            .select('*')
            .order('username', { ascending: true });

        if (error) {
            console.error("Ошибка загрузки данных:", error);
            return;
        }

        const listContainer = document.getElementById('groupList');
        if (listContainer) {
            listContainer.innerHTML = data.map(user => `
                <div class="user-item">
                    <div class="status-dot" style="background: ${user.color || '#ccc'}"></div>
                    <div class="user-info">
                        <b>${user.username}</b>
                        <span>${user.status || 'Статус не задан'}</span>
                    </div>
                </div>
            `).join('');
        }

        const me = data.find(u => u.id === MY_USER_ID);
        if (me && document.getElementById('myInfo')) {
            document.getElementById('myInfo').innerText = `Вы зашли как: ${me.username}`;
        }
    }

    // Запускаем загрузку
    fetchGroup();
    setInterval(fetchGroup, 5000);
</script>

</body>
</html>
