<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Cloud Pro — Firebase & GitHub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #1e3c72, #2a5298); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; color: #333; }
        
        .container { background: #fff; padding: 30px; border-radius: 20px; width: 100%; max-width: 450px; shadow: 0 15px 35px rgba(0,0,0,0.3); }
        h2 { text-align: center; margin-bottom: 20px; color: #1e3c72; }
        
        input { width: 100%; padding: 12px; margin-bottom: 10px; border: 2px solid #eee; border-radius: 10px; outline: none; transition: 0.3s; }
        input:focus { border-color: #2a5298; }
        
        .btn-send { width: 100%; padding: 15px; background: #2a5298; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-bottom: 20px; }
        
        .search-box { margin-bottom: 20px; background: rgba(255,255,255,0.2); padding: 10px; border-radius: 10px; width: 100%; max-width: 450px; }
        .search-box input { margin-bottom: 0; background: white; }

        #feed { width: 100%; max-width: 450px; }
        .post { background: white; padding: 20px; border-radius: 15px; margin-bottom: 15px; position: relative; animation: slideIn 0.4s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .post-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .post-name { font-weight: bold; color: #1e3c72; font-size: 18px; }
        .post-time { font-size: 11px; color: #999; }
        
        .actions { display: flex; gap: 10px; margin-top: 15px; }
        .btn-action { padding: 8px 15px; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; transition: 0.2s; }
        .like-btn { background: #ffebee; color: #e91e63; }
        .like-btn:hover { background: #f8bbd0; }
        .del-btn { background: #f5f5f5; color: #757575; }
        .del-btn:hover { background: #ffcdd2; color: #d32f2f; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Новая Заявка</h2>
        <form id="mainForm">
            <input type="text" id="uName" placeholder="Имя пользователя" required>
            <input type="email" id="uEmail" placeholder="Email адрес" required>
            <button type="submit" class="btn-send">Опубликовать в Облаке</button>
        </form>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="🔍 Быстрый поиск по имени...">
    </div>

    <div id="feed"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { 
            getFirestore, collection, addDoc, query, orderBy, onSnapshot, 
            serverTimestamp, updateDoc, doc, increment, deleteDoc 
        } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBUDDbQGURKwXY8dQ_qF-7v2n0NKEf62MA",
            authDomain: "ramina243.firebaseapp.com",
            projectId: "ramina243",
            storageBucket: "ramina243.firebasestorage.app",
            messagingSenderId: "923144008758",
            appId: "1:923144008758:web:34347eba64da8be4369497"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- ФУНКЦИИ ДЛЯ ОТЧЕТА ---

        // 1. Создание записи
        window.sendPost = async (name, email) => {
            await addDoc(collection(db, "requests"), {
                name, email, likes: 0, timestamp: serverTimestamp()
            });
        };

        // 2. Лайк (Обновление)
        window.handleLike = async (id) => {
            const ref = doc(db, "requests", id);
            await updateDoc(ref, { likes: increment(1) });
        };

        // 3. Удаление
        window.handleDelete = async (id) => {
            if(confirm("Удалить эту запись из облака?")) {
                await deleteDoc(doc(db, "requests", id));
            }
        };

        // --- ОТОБРАЖЕНИЕ И ПОИСК ---
        const feed = document.getElementById("feed");
        const searchInput = document.getElementById("searchInput");

        function renderFeed(filter = "") {
            const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));
            onSnapshot(q, (snapshot) => {
                feed.innerHTML = "";
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    if (!data.name.toLowerCase().includes(filter.toLowerCase())) return;

                    const time = data.timestamp?.toDate().toLocaleString() || "Загрузка...";
                    feed.innerHTML += `
                        <div class="post">
                            <div class="post-header">
                                <span class="post-name">${data.name}</span>
                                <span class="post-time">${time}</span>
                            </div>
                            <p style="color: #666; font-size: 14px;">${data.email}</p>
                            <div class="actions">
                                <button class="btn-action like-btn" onclick="handleLike('${doc.id}')">❤️ ${data.likes || 0}</button>
                                <button class="btn-action del-btn" onclick="handleDelete('${doc.id}')">🗑 Удалить</button>
                            </div>
                        </div>
                    `;
                });
            });
        }

        // Слушатель формы
        document.getElementById("mainForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const name = document.getElementById("uName").value;
            const email = document.getElementById("uEmail").value;
            await sendPost(name, email);
            e.target.reset();
        });

        // Слушатель поиска
        searchInput.addEventListener("input", (e) => renderFeed(e.target.value));

        // Старт
        renderFeed();
    </script>
</body>
</html>
