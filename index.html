<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Cloud Ultra Pink | DM</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI'; }
body { background:#fff1f1; display:flex; flex-direction:column; align-items:center; padding:20px; }

.auth-bar { width:100%; max-width:600px; display:flex; justify-content:space-between; background:white; padding:15px; border-radius:20px; margin-bottom:20px; }
.user-photo { width:40px; height:40px; border-radius:50%; }

.tabs { display:flex; gap:10px; margin-bottom:20px; }
.tab-btn { padding:10px 20px; border:none; border-radius:10px; cursor:pointer; }
.active { background:#f06292; color:white; }

.content { display:none; width:100%; max-width:500px; }
.content.active { display:block; }

.dm-box { background:white; padding:20px; border-radius:20px; }
.user-list { display:flex; gap:10px; overflow:auto; margin-bottom:10px; }
.user { text-align:center; cursor:pointer; }
.user img { width:50px; border-radius:50%; }

.chat { height:250px; overflow:auto; background:#fff9fb; padding:10px; border-radius:10px; margin-bottom:10px; display:flex; flex-direction:column; gap:8px; }
.msg { padding:10px; border-radius:10px; max-width:70%; }
.sent { background:#f06292; color:white; align-self:flex-end; }
.received { background:#eee; align-self:flex-start; }

.input { display:flex; gap:10px; }
input { flex:1; padding:10px; border-radius:10px; border:1px solid #ddd; }
button { padding:10px; border:none; border-radius:10px; cursor:pointer; background:#f06292; color:white; }
</style>
</head>

<body>

<div class="auth-bar">
    <div id="userInfo" style="display:none;">
        <img id="userPhoto" class="user-photo">
        <span id="userName"></span>
        <button id="logoutBtn">Выйти</button>
    </div>
    <button id="loginBtn">Войти через Google</button>
</div>

<div class="tabs">
    <button class="tab-btn active" onclick="switchTab('feed')">Лента</button>
    <button class="tab-btn" onclick="switchTab('dm')">Сообщения</button>
</div>

<div id="feed" class="content active">
    <p style="text-align:center;">Лента работает 👍</p>
</div>

<div id="dm" class="content">
    <div class="dm-box">
        <div id="users" class="user-list"></div>

        <div id="chatBlock" style="display:none;">
            <div id="chat" class="chat"></div>

            <div class="input">
                <input id="msg" placeholder="Сообщение...">
                <button id="send">➤</button>
            </div>
        </div>

        <p id="selectText">Выбери пользователя</p>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp, doc, setDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyBUDDbQGURKwXY8dQ_qF-7v2n0NKEf62MA",
    authDomain: "ramina243.firebaseapp.com",
    projectId: "ramina243"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

let selectedUser = null;
let unsubscribe = null;

window.switchTab = (id) => {
    document.querySelectorAll('.content').forEach(e => e.classList.remove('active'));
    document.getElementById(id).classList.add('active');
};

loginBtn.onclick = () => signInWithPopup(auth, provider);
logoutBtn.onclick = () => signOut(auth);

onAuthStateChanged(auth, async (user) => {
    if(user){
        userInfo.style.display = "block";
        loginBtn.style.display = "none";

        userPhoto.src = user.photoURL;
        userName.innerText = user.displayName;

        await setDoc(doc(db,"users",user.uid),{
            uid:user.uid,
            name:user.displayName,
            photo:user.photoURL
        });

        loadUsers();
    }
});

function loadUsers(){
    onSnapshot(collection(db,"users"), snap=>{
        users.innerHTML="";
        snap.forEach(d=>{
            const u=d.data();
            if(u.uid===auth.currentUser.uid) return;

            users.innerHTML += `
            <div class="user" onclick="openChat('${u.uid}','${u.name}')">
                <img src="${u.photo}">
                <p>${u.name.split(" ")[0]}</p>
            </div>`;
        });
    });
}

window.openChat = (uid,name)=>{
    selectedUser = uid;
    chatBlock.style.display="block";
    selectText.style.display="none";

    loadMessages(uid);
};

function loadMessages(uid){
    if(unsubscribe) unsubscribe();

    const my = auth.currentUser.uid;
    const chatId = my < uid ? my+"_"+uid : uid+"_"+my;

    const q = query(collection(db,"chats",chatId,"messages"), orderBy("timestamp"));

    unsubscribe = onSnapshot(q, snap=>{
        chat.innerHTML="";
        snap.forEach(d=>{
            const m=d.data();
            const side = m.senderId===my ? "sent":"received";
            chat.innerHTML += `<div class="msg ${side}">${m.text}</div>`;
        });
        chat.scrollTop=chat.scrollHeight;
    });
}

send.onclick = async ()=>{
    const text = msg.value.trim();
    if(!text || !selectedUser) return;

    const my = auth.currentUser.uid;
    const chatId = my < selectedUser ? my+"_"+selectedUser : selectedUser+"_"+my;

    await addDoc(collection(db,"chats",chatId,"messages"),{
        senderId: my,
        text: text,
        timestamp: serverTimestamp()
    });

    msg.value="";
};
</script>

</body>
</html>
