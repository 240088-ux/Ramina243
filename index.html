<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Монитор статусов ✨</title>
    <style>
        /* Нежно-розовая цветовая палитра */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #fff0f5; 
            display: flex; 
            justify-content: center; 
            padding: 20px; 
            color: #5d4a4a;
        }
        
        .container { 
            width: 100%; 
            max-width: 450px; 
            background: #ffffff; 
            padding: 30px; 
            border-radius: 25px; 
            box-shadow: 0 10px 25px rgba(255, 182, 193, 0.4); 
        }

        h2 { text-align: center; color: #ff8da1; font-weight: 600; margin-bottom: 20px; }

        .my-profile { 
            background: #fff5f7; 
            padding: 20px; 
            border-radius: 20px; 
            margin-bottom: 25px; 
            border: 1px dashed #ffc0cb; 
            text-align: center;
        }

        #myInfo { font-weight: bold; color: #d87093; margin-bottom: 15px; }

        .buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px; }
        
        button { 
            padding: 12px; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            color: white; 
            font-weight: 600; 
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        button:hover { transform: translateY(-2px); box-shadow: 0 6px 12px rgba(255, 105, 180, 0.3); opacity: 0.9; }

        .btn-google { background: #4285F4; width: 100%; margin-top: 10px; }
        .btn-study { background: #ffb6c1; } 
        .btn-coffee { background: #fbc4ab; } 
        .btn-game { background: #c1bdff; }  
        .btn-home { background: #e2e2e2; color: #666; }
        
        hr { border: 0; height: 1px; background: #ffe4e1; margin: 20px 0; }

        .user-item { 
            display: flex; 
            align-items: center; 
            padding: 12px; 
            background: #fffafa;
            border-radius: 15px;
            margin-bottom: 10px;
        }

        .status-dot { 
            width: 14px; 
            height: 14px; 
            border-radius: 50%; 
            margin-right: 15px; 
            border: 2px solid white; 
            box-shadow: 0 0 8px rgba(0,0,0,0.1); 
        }

        .user-info b { display: block; color: #8b5a6d; font-size: 1.05em; }
        .user-info span { font-size: 0.85em; color: #a9a9a9; }
    </style>
</head>
<body>

<div class="container">
    <h2>Мой профиль</h2>
    <div class="my-profile">
        <div id="auth-box">
            <p id="myInfo">Проверка авторизации...</p>
            </div>
        
        <div id="status-box" style="display: none;">
            <div class="buttons">
                <button class="btn-study" onclick="changeStatus('📚 Учусь', '#ffb6c1')">📚 Учусь</button>
                <button class="btn-coffee" onclick="changeStatus('☕ Кофе', '#fbc4ab')">☕ Кофе</button>
                <button class="btn-game" onclick="changeStatus('🎮 В игре', '#c1bdff')">🎮 В игре</button>
                <button class="btn-home" onclick="changeStatus('🏠 Дома', '#e2e2e2')">🏠 Дома</button>
            </div>
            <p><a href="#" onclick="logout()" style="color: #d87093; font-size: 12px;">Выйти из аккаунта</a></p>
        </div>
    </div>

    <hr>
    <h2>Монитор группы</h2>
    <div id="groupList"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    const SUPABASE_URL = 'https://aecurveycefurzgkloaq.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_1N6vKLVRSpJeWya6w7Aaig_-w5RA8yY';
    const sb_client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Функция входа
    async function login() {
        const { error } = await sb_client.auth.signInWithOAuth({
            provider: 'google',
            options: { redirectTo: window.location.origin }
        });
        if (error) alert("Ошибка входа: " + error.message);
    }

    // Функция выхода
    async function logout() {
        await sb_client.auth.signOut();
        window.location.reload();
    }

    // Изменение статуса
    async function changeStatus(statusText, statusColor) {
        const { data: { user } } = await sb_client.auth.getUser();
        if (!user) return alert("Сначала войдите!");

        const { error } = await sb_client
            .from('profiles')
            .upsert({ 
                id: user.id, 
                username: user.user_metadata.full_name, 
                status: statusText, 
                color: statusColor 
            });

        if (error) console.error("Ошибка:", error);
        fetchGroup();
    }

    // Загрузка списка группы
    async function fetchGroup() {
        const { data, error } = await sb_client.from('profiles').select('*').order('username');
        if (error) return;

        const listContainer = document.getElementById('groupList');
        listContainer.innerHTML = data.map(user => `
            <div class="user-item">
                <div class="status-dot" style="background: ${user.color || '#ffc0cb'}"></div>
                <div class="user-info">
                    <b>${user.username || 'Аноним'}</b>
                    <span>${user.status || 'Нет статуса'}</span>
                </div>
            </div>
        `).join('');

        // Проверка авторизации для отображения интерфейса
        const { data: { user } } = await sb_client.auth.getUser();
        const infoPara = document.getElementById('myInfo');
        const statusBox = document.getElementById('status-box');

        if (user) {
            infoPara.innerText = `Привет, ${user.user_metadata.full_name}! ✨`;
            statusBox.style.display = 'block';
        } else {
            infoPara.innerHTML = `Войдите, чтобы ставить статусы:<br>
                <button class="btn-google" onclick="login()">🔵 Войти через Google</button>`;
            statusBox.style.display = 'none';
        }
    }

    fetchGroup();
    setInterval(fetchGroup, 5000);
</script>

</body>
</html>
