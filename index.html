<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Cloud DM | Private Edition</title>
    <style>
        /* Твои базовые стили */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #fce4ec, #fff1f1); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; color: #5d4037; }
        
        .auth-section { margin-bottom: 20px; }
        .user-profile { display: flex; align-items: center; gap: 10px; background: white; padding: 8px 15px; border-radius: 50px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .user-photo { width: 35px; height: 35px; border-radius: 50%; }

        /* Вкладки: Общее / Личное */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 10px 20px; border: none; border-radius: 20px; cursor: pointer; background: white; color: #f06292; font-weight: bold; transition: 0.3s; }
        .tab-btn.active { background: #f06292; color: white; }

        .container { width: 100%; max-width: 500px; display: none; }
        .container.active { display: block; }

        /* Стили чата */
        .user-selector { background: white; padding: 15px; border-radius: 15px; margin-bottom: 15px; display: flex; gap: 10px; overflow-x: auto; }
        .user-card { cursor: pointer; text-align: center; min-width: 70px; font-size: 10px; }
        .user-card img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid transparent; }
        .user-card.selected img { border-color: #f06292; }

        .chat-box { background: rgba(255,255,255,0.7); backdrop-filter: blur(10px); border-radius: 20px; padding: 20px; height: 400px; display: flex; flex-direction: column; }
        #messagesList { flex-grow: 1; overflow-y: auto; margin-bottom: 15px; padding: 10px; display: flex; flex-direction: column; gap: 10px; }
        
        .msg { max-width: 80%; padding: 10px 15px; border-radius: 15px; font-size: 14px; position: relative; }
        .msg.sent { align-self: flex-end; background: #f06292; color: white; border-bottom-right-radius: 2px; }
        .msg.received { align-self: flex-start; background: white; color: #5d4037; border-bottom-left-radius: 2px; }

        input, button#sendDmBtn { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #f8bbd0; margin-top: 5px; outline: none; }
        button#sendDmBtn { background: #f06292; color: white; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="auth-section">
        <button id="loginBtn" class="tab-btn active">Войти через Google</button>
        <div id="userInfo" style="display: none;" class="user-profile">
            <img id="userPhoto" class="user-photo" src="">
            <span id="userNameDisplay"></span>
        </div>
    </div>

    <div class="tabs" id="mainTabs" style="display: none;">
        <button class="tab-btn active" onclick="switchTab('feedTab')">Общая лента</button>
        <button class="tab-btn" onclick="switchTab('dmTab')">Личные сообщения (DM)</button>
    </div>

    <div id="feedTab" class="container active">
        <input type="text" id="userComment" placeholder="Ваш публичный отзыв...">
        <button id="submitBtn" class="tab-btn active" style="width:100%; margin-top:10px;">Опубликовать</button>
        <div id="feed" style="margin-top:20px;"></div>
    </div>

    <div id="dmTab" class="container">
        <p style="font-size: 12px; margin-bottom: 5px;">Выберите, кому написать:</p>
        <div class="user-selector" id="usersList">
            </div>
        
        <div class="chat-box">
            <div id="messagesList">
                <p style="text-align:center; color:#aaa; font-size:12px;">Выберите собеседника, чтобы начать чат</p>
            </div>
            <div id="dmInputArea" style="display:none;">
                <input type="text" id="dmText" placeholder="Напишите сообщение...">
                <button id="sendDmBtn">Отправить лично</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, where, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBUDDbQGURKwXY8dQ_qF-7v2n0NKEf62MA",
            authDomain: "ramina243.firebaseapp.com",
            projectId: "ramina243",
            storageBucket: "ramina243.firebasestorage.app",
            messagingSenderId: "923144008758",
            appId: "1:923144008758:web:34347eba64da8be4369497"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        let currentUser = null;
        let selectedRecipientId = null;

        // --- ГЛОБАЛЬНЫЕ ФУНКЦИИ ---
        window.switchTab = (tabId) => {
            document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        };

        // --- АВТОРИЗАЦИЯ И СПИСОК ПОЛЬЗОВАТЕЛЕЙ ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                document.getElementById("loginBtn").style.display = "none";
                document.getElementById("userInfo").style.display = "flex";
                document.getElementById("mainTabs").style.display = "flex";
                document.getElementById("userPhoto").src = user.photoURL;
                document.getElementById("userNameDisplay").innerText = user.displayName;

                // Сохраняем пользователя в список контактов
                await setDoc(doc(db, "users", user.uid), {
                    uid: user.uid,
                    name: user.displayName,
                    photo: user.photoURL
                });

                loadUsers();
            }
        });

        document.getElementById("loginBtn").onclick = () => signInWithPopup(auth, provider);

        // Загрузка списка людей для чата
        function loadUsers() {
            onSnapshot(collection(db, "users"), (snap) => {
                const list = document.getElementById("usersList");
                list.innerHTML = "";
                snap.forEach(doc => {
                    const u = doc.data();
                    if(u.uid === currentUser.uid) return;
                    list.innerHTML += `
                        <div class="user-card" onclick="startChat('${u.uid}', '${u.name}')">
                            <img src="${u.photo}">
                            <div>${u.name.split(' ')[0]}</div>
                        </div>`;
                });
            });
        }

        // --- ЛОГИКА ЛИЧНЫХ СООБЩЕНИЙ (DM) ---
        window.startChat = (uid, name) => {
            selectedRecipientId = uid;
            document.getElementById("dmInputArea").style.display = "block";
            
            // Создаем ID чата (всегда одинаковый для двоих)
            const chatId = currentUser.uid < uid ? `${currentUser.uid}_${uid}` : `${uid}_${currentUser.uid}`;
            
            const q = query(collection(db, "direct_messages"), where("chatId", "==", chatId), orderBy("timestamp", "asc"));
            
            onSnapshot(q, (snap) => {
                const box = document.getElementById("messagesList");
                box.innerHTML = "";
                snap.forEach(d => {
                    const msg = d.data();
                    const side = msg.senderId === currentUser.uid ? "sent" : "received";
                    box.innerHTML += `<div class="msg ${side}">${msg.text}</div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        };

        document.getElementById("sendDmBtn").onclick = async () => {
            const text = document.getElementById("dmText").value;
            if(!text || !selectedRecipientId) return;

            const chatId = currentUser.uid < selectedRecipientId ? `${currentUser.uid}_${selectedRecipientId}` : `${selectedRecipientId}_${currentUser.uid}`;

            await addDoc(collection(db, "direct_messages"), {
                chatId: chatId,
                senderId: currentUser.uid,
                text: text,
                timestamp: serverTimestamp()
            });
            document.getElementById("dmText").value = "";
        };

        // --- ПУБЛИЧНАЯ ЛЕНТА (Твой старый код) ---
        document.getElementById("submitBtn").onclick = async () => {
            const comment = document.getElementById("userComment").value;
            await addDoc(collection(db, "requests"), {
                name: currentUser.displayName,
                avatar: currentUser.photoURL,
                comment: comment,
                timestamp: serverTimestamp()
            });
            document.getElementById("userComment").value = "";
        };

        onSnapshot(query(collection(db, "requests"), orderBy("timestamp", "desc")), (snap) => {
            const feed = document.getElementById("feed");
            feed.innerHTML = "";
            snap.forEach(d => {
                const data = d.data();
                feed.innerHTML += `<div style="background:white; padding:10px; border-radius:10px; margin-bottom:10px; font-size:13px;">
                    <b>${data.name}:</b> ${data.comment}
                </div>`;
            });
        });

    </script>
</body>
</html>
