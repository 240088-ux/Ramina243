<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Cloud Registration | Fixed</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI'; }

body {
    background: linear-gradient(135deg, #fce4ec, #fff1f1);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
}

.auth-container { margin-bottom: 20px; text-align: center; }

.user-profile {
    display: flex;
    align-items: center;
    gap: 10px;
    background: white;
    padding: 10px 20px;
    border-radius: 50px;
}

.user-photo { width: 35px; height: 35px; border-radius: 50%; }

.form-container {
    background: white;
    padding: 30px;
    border-radius: 20px;
    width: 100%;
    max-width: 400px;
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 12px;
    margin-bottom: 10px;
    border-radius: 10px;
    border: 1px solid #ddd;
}

button {
    width: 100%;
    padding: 12px;
    border: none;
    background: #f06292;
    color: white;
    border-radius: 10px;
    cursor: pointer;
}

#feed { width: 100%; max-width: 450px; }

.post {
    background: white;
    padding: 15px;
    border-radius: 15px;
    margin-bottom: 15px;
}

.avatar { width: 40px; border-radius: 50%; }

.post-img { width: 100%; border-radius: 10px; margin-top: 10px; }

.like-btn {
    margin-top: 10px;
    background: #fff0f5;
    color: #f06292;
}
</style>
</head>

<body>

<div class="auth-container">
    <button id="loginBtn">Войти через Google</button>

    <div id="userInfo" style="display:none;">
        <img id="userPhoto" class="user-photo">
        <span id="userNameDisplay"></span>
        <button id="logoutBtn">Выйти</button>
    </div>
</div>

<div class="form-container" id="formBox" style="display:none;">
    <h3>Оставить отзыв</h3>
    <form id="feedbackForm">
        <input type="text" id="userComment" placeholder="Комментарий" required>
        <input type="text" id="postImage" placeholder="Ссылка на картинку">
        <button type="submit">Опубликовать</button>
    </form>
</div>

<input type="text" id="searchInput" placeholder="Поиск...">

<div id="feed"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, updateDoc, doc, increment } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

const firebaseConfig = {
    apiKey: "ТВОЙ_API_KEY",
    authDomain: "ТВОЙ_DOMAIN",
    projectId: "ТВОЙ_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

let currentSearchTerm = "";

// LOGIN
loginBtn.onclick = () => signInWithPopup(auth, provider);
logoutBtn.onclick = () => signOut(auth);

onAuthStateChanged(auth, (user) => {
    if (user) {
        loginBtn.style.display = "none";
        userInfo.style.display = "block";
        formBox.style.display = "block";

        userPhoto.src = user.photoURL;
        userNameDisplay.innerText = user.displayName;
    } else {
        loginBtn.style.display = "block";
        userInfo.style.display = "none";
        formBox.style.display = "none";
    }
});

// CREATE POST
async function createNewPost(comment, imageUrl) {
    const user = auth.currentUser;

    if (!user) {
        alert("Сначала войдите!");
        return;
    }

    await addDoc(collection(db, "requests"), {
        name: user.displayName,
        email: user.email,
        avatar: user.photoURL,
        comment,
        image: imageUrl,
        likes: 0,
        timestamp: serverTimestamp()
    });
}

// LOAD POSTS
function loadRequests() {
    const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));

    onSnapshot(q, (snapshot) => {
        feed.innerHTML = "";

        snapshot.forEach((docSnap) => {
            const data = docSnap.data();

            if (data.name.toLowerCase().includes(currentSearchTerm.toLowerCase())) {

                const img = data.image
                    ? `<img src="${data.image}" class="post-img" onerror="this.style.display='none'">`
                    : "";

                feed.innerHTML += `
                <div class="post">
                    <img src="${data.avatar}" class="avatar">
                    <b>${data.name}</b>
                    <div>${data.comment}</div>
                    ${img}
                    <div>${data.timestamp ? data.timestamp.toDate().toLocaleTimeString() : ""}</div>
                    <button class="like-btn" onclick="like('${docSnap.id}')">
                        ❤️ ${data.likes || 0}
                    </button>
                </div>`;
            }
        });
    });
}

// LIKE
window.like = async (id) => {
    const ref = doc(db, "requests", id);
    await updateDoc(ref, { likes: increment(1) });
};

// SEARCH
searchInput.addEventListener("input", (e) => {
    currentSearchTerm = e.target.value;
});

// SUBMIT
feedbackForm.addEventListener("submit", async (e) => {
    e.preventDefault();

    await createNewPost(
        userComment.value,
        postImage.value
    );

    feedbackForm.reset();
});

loadRequests();
</script>

</body>
</html>
