<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Mini Instagram PRO</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:#fafafa;
color:#000;
transition:0.3s;
}

.dark{
background:#121212;
color:#fff;
}

.header{
display:flex;
justify-content:space-between;
padding:10px 20px;
background:white;
position:sticky;
top:0;
}

.dark .header{background:#1e1e1e;}

button{
border:none;
background:#0095f6;
color:white;
padding:7px 12px;
border-radius:8px;
cursor:pointer;
margin-left:5px;
}

.container{
display:flex;
flex-direction:column;
align-items:center;
}

.post{
width:400px;
background:white;
margin:15px;
border-radius:10px;
padding:10px;
}

.dark .post{background:#1e1e1e;}

.avatar{
width:40px;
height:40px;
border-radius:50%;
}

.post-header{
display:flex;
align-items:center;
gap:10px;
}

.comment{
font-size:13px;
margin-left:10px;
}

input{
padding:8px;
border-radius:10px;
border:1px solid #ccc;
margin-top:5px;
width:100%;
}
</style>
</head>

<body>

<div class="header">
<div>MiniInstagram</div>

<div>
<button id="loginBtn">Login</button>
<button id="logoutBtn">Logout</button>
<button id="themeBtn">🌙</button>
</div>
</div>

<div class="container">

<input type="text" id="search" placeholder="Поиск...">

<div id="feed"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";

import {
getFirestore, collection, addDoc, query, orderBy,
onSnapshot, serverTimestamp, doc, updateDoc, increment
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

import {
getAuth, signInWithPopup, GoogleAuthProvider,
onAuthStateChanged, signOut
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

// CONFIG
const firebaseConfig = {
apiKey: "AIzaSyBUDDbQGURKwXY8dQ_qF-7v2n0NKEf62MA",
authDomain: "ramina243.firebaseapp.com",
projectId: "ramina243"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let currentUser = null;
let searchText = "";

// ===== AUTH =====
document.getElementById("loginBtn").onclick = async ()=>{
const provider = new GoogleAuthProvider();
await signInWithPopup(auth, provider);
};

document.getElementById("logoutBtn").onclick = ()=>{
signOut(auth);
};

onAuthStateChanged(auth,(user)=>{
if(user){
currentUser = user;
document.getElementById("loginBtn").innerText = user.displayName;
}
});

// ===== CREATE POST =====
document.body.addEventListener("dblclick", async ()=>{
if(!currentUser) return alert("Войди!");

await addDoc(collection(db,"posts"),{
name: currentUser.displayName,
avatar: currentUser.photoURL,
text: "Новый пост 😎",
likes: 0,
timestamp: serverTimestamp()
});
});

// ===== LOAD =====
function loadPosts(){
const q = query(collection(db,"posts"),orderBy("timestamp","desc"));

onSnapshot(q,(snapshot)=>{
const feed = document.getElementById("feed");
feed.innerHTML="";

snapshot.forEach(docSnap=>{
const data = docSnap.data();

if(data.name.toLowerCase().includes(searchText.toLowerCase())){

feed.innerHTML += `
<div class="post">

<div class="post-header">
<img src="${data.avatar}" class="avatar">
<b>${data.name}</b>
</div>

<p>${data.text}</p>

<button onclick="like('${docSnap.id}',this)">❤️ ${data.likes || 0}</button>

<input placeholder="Комментарий..." 
onkeypress="addComment(event,'${docSnap.id}')">

<div id="comments-${docSnap.id}"></div>

</div>`;
}
});
});
}

// ===== LIKE =====
window.like = async(id,btn)=>{
btn.style.transform="scale(1.3)";
setTimeout(()=>btn.style.transform="scale(1)",200);

const ref = doc(db,"posts",id);
await updateDoc(ref,{likes:increment(1)});
};

// ===== COMMENTS =====
window.addComment = async(e,id)=>{
if(e.key==="Enter"){
const text = e.target.value;

await addDoc(collection(db,"comments"),{
postId:id,
user: currentUser.displayName,
text,
timestamp: serverTimestamp()
});

e.target.value="";
}
};

// ===== LOAD COMMENTS =====
function loadComments(){
const q = query(collection(db,"comments"),orderBy("timestamp","asc"));

onSnapshot(q,(snapshot)=>{
snapshot.forEach(docSnap=>{
const data = docSnap.data();
const block = document.getElementById("comments-"+data.postId);

if(block){
block.innerHTML += `<div class="comment"><b>${data.user}:</b> ${data.text}</div>`;
}
});
});
}

// ===== SEARCH =====
document.getElementById("search").addEventListener("input",(e)=>{
searchText = e.target.value;
loadPosts();
});

// ===== THEME =====
document.getElementById("themeBtn").onclick = ()=>{
document.body.classList.toggle("dark");
};

// START
loadPosts();
loadComments();

</script>

</body>
</html>
