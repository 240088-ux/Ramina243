<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Instagram ULTRA</title>

<style>
body{margin:0;font-family:sans-serif;background:#fafafa;}
.dark{background:#121212;color:white;}

.header{
display:flex;
justify-content:space-between;
padding:10px;
background:white;
position:sticky;
top:0;
}

.story-bar{
display:flex;
overflow-x:auto;
padding:10px;
gap:10px;
}

.story{
text-align:center;
font-size:12px;
}

.story img{
width:60px;
height:60px;
border-radius:50%;
border:3px solid pink;
}

.post{
width:400px;
margin:20px auto;
background:white;
padding:10px;
border-radius:10px;
}

.post img{
width:100%;
border-radius:10px;
}

.avatar{width:40px;height:40px;border-radius:50%;}
</style>
</head>

<body>

<div class="header">
<div>Instagram ULTRA</div>
<div>
<button id="loginBtn">Login</button>
<button id="logoutBtn">Logout</button>
<button id="themeBtn">🌙</button>
</div>
</div>

<div class="story-bar" id="stories"></div>

<div style="text-align:center;margin:10px;">
<input type="file" id="fileInput">
<button id="uploadBtn">Загрузить пост</button>
</div>

<div id="feed"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";

import {
getFirestore, collection, addDoc, query, orderBy,
onSnapshot, serverTimestamp, doc, updateDoc, increment
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

import {
getAuth, signInWithPopup, GoogleAuthProvider,
onAuthStateChanged, signOut
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

import {
getStorage, ref, uploadBytes, getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-storage.js";

// CONFIG
const firebaseConfig = {
apiKey: "AIzaSyBUDDbQGURKwXY8dQ_qF-7v2n0NKEf62MA",
authDomain: "ramina243.firebaseapp.com",
projectId: "ramina243",
storageBucket: "ramina243.appspot.com"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const storage = getStorage(app);

let user = null;

// LOGIN
loginBtn.onclick = async ()=>{
const provider = new GoogleAuthProvider();
await signInWithPopup(auth, provider);
};

logoutBtn.onclick = ()=>signOut(auth);

onAuthStateChanged(auth,(u)=>{user=u});

// ===== UPLOAD POST =====
uploadBtn.onclick = async ()=>{
if(!user) return alert("Войди!");

const file = fileInput.files[0];
const storageRef = ref(storage,"posts/"+file.name);

await uploadBytes(storageRef,file);
const url = await getDownloadURL(storageRef);

await addDoc(collection(db,"posts"),{
name:user.displayName,
avatar:user.photoURL,
image:url,
likes:0,
timestamp:serverTimestamp()
});
};

// ===== LOAD POSTS =====
function loadPosts(){
const q = query(collection(db,"posts"),orderBy("timestamp","desc"));

onSnapshot(q,(snap)=>{
feed.innerHTML="";

snap.forEach(docSnap=>{
const d = docSnap.data();

feed.innerHTML += `
<div class="post">
<div>
<img src="${d.avatar}" class="avatar"> ${d.name}
</div>

<img src="${d.image}">

<button onclick="like('${docSnap.id}',this)">❤️ ${d.likes||0}</button>
</div>`;
});
});
}

// LIKE
window.like = async(id,btn)=>{
btn.style.transform="scale(1.2)";
setTimeout(()=>btn.style.transform="scale(1)",200);

await updateDoc(doc(db,"posts",id),{likes:increment(1)});
};

// ===== STORIES =====
async function addStory(url){
await addDoc(collection(db,"stories"),{
user:user.displayName,
avatar:user.photoURL,
image:url,
time:Date.now()
});
}

function loadStories(){
const q = query(collection(db,"stories"));

onSnapshot(q,(snap)=>{
stories.innerHTML="";

snap.forEach(docSnap=>{
const d = docSnap.data();

// удаление через 24 часа
if(Date.now() - d.time < 86400000){
stories.innerHTML += `
<div class="story">
<img src="${d.avatar}">
<div>${d.user}</div>
</div>`;
}
});
});
}

// загрузка сторис (двойной клик)
document.body.addEventListener("dblclick", async ()=>{
if(!user) return;

const file = fileInput.files[0];
if(!file) return;

const storageRef = ref(storage,"stories/"+file.name);

await uploadBytes(storageRef,file);
const url = await getDownloadURL(storageRef);

addStory(url);
});

// THEME
themeBtn.onclick = ()=>document.body.classList.toggle("dark");

// START
loadPosts();
loadStories();

</script>

</body>
</html>
