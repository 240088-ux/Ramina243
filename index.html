<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Cloud Ultra Pink | Final Edition</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #fff0f6; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; color: #4a4a4a; }

        /* Красивый градиентный фон сверху */
        .top-decor { position: fixed; top: 0; width: 100%; height: 5px; background: linear-gradient(90deg, #ff80ab, #f06292, #ff80ab); z-index: 1000; }

        .auth-container { width: 100%; max-width: 500px; display: flex; justify-content: space-between; align-items: center; margin: 20px 0; }
        
        .user-profile { background: white; padding: 8px 15px; border-radius: 50px; display: flex; align-items: center; gap: 10px; box-shadow: 0 4px 15px rgba(255,182,193,0.2); }
        .user-avatar { width: 35px; height: 35px; border-radius: 50%; border: 2px solid #ff80ab; }

        .glass-box { 
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px); 
            padding: 30px; border-radius: 30px; width: 100%; max-width: 500px; 
            box-shadow: 0 20px 40px rgba(255, 182, 193, 0.25); border: 1px solid white;
            text-align: center; margin-bottom: 25px;
        }

        h2 { color: #d81b60; margin-bottom: 15px; min-height: 30px; }

        input { 
            width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #fce4ec; 
            border-radius: 15px; outline: none; transition: 0.3s; font-size: 14px;
        }
        input:focus { border-color: #ff80ab; box-shadow: 0 0 10px rgba(255,128,171,0.2); }

        .btn { 
            width: 100%; padding: 15px; border: none; border-radius: 15px; cursor: pointer; 
            font-weight: bold; font-size: 16px; transition: 0.4s;
        }
        .btn-main { background: linear-gradient(45deg, #ff80ab, #f06292); color: white; }
        .btn-main:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(240, 98, 146, 0.3); }
        
        .btn-login { background: white; color: #f06292; border: 2px solid #f06292; padding: 10px 20px; width: auto; }

        /* Стили постов */
        #feed { width: 100%; max-width: 500px; }
        .post-card { 
            background: white; padding: 20px; border-radius: 20px; margin-bottom: 20px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.03); border-left: 5px solid #ff80ab;
            animation: slideUp 0.5s ease forwards;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .post-info { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .post-text { font-size: 15px; line-height: 1.5; color: #555; }
        
        .like-zone { margin-top: 15px; display: flex; align-items: center; gap: 10px; }
        .heart-btn { 
            background: #fff0f3; border: none; color: #ff4081; padding: 8px 15px; 
            border-radius: 12px; cursor: pointer; font-size: 18px; transition: 0.2s;
        }
        .heart-btn:hover { background: #ffc1e3; }
        .heart-btn:active { transform: scale(1.3); }

        #searchInp { border-radius: 50px; background: #fff; margin-bottom: 30px; }
    </style>
</head>
<body>

    <div class="top-decor"></div>

    <div class="auth-container">
        <div id="userInfo"></div>
        <button class="btn btn-login" id="loginAction">Войти через Google</button>
    </div>

    <div class="glass-box" id="composer" style="display: none;">
        <h2 id="typewriter"></h2>
        <input type="text" id="userMsg" placeholder="Поделись настроением...">
        <button class="btn btn-main" id="sendBtn">Опубликовать в Облаке</button>
    </div>

    <input type="text" id="searchInp" placeholder="🔍 Найти автора или пост..." style="max-width:500px;">

    <div id="feed"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, updateDoc, doc, increment } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
        import { getAuth, signInWithRedirect, GoogleAuthProvider, onAuthStateChanged, signOut, getRedirectResult } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBUDDbQGURKwXY8dQ_qF-7v2n0NKEf62MA",
            authDomain: "ramina243.firebaseapp.com",
            projectId: "ramina243",
            storageBucket: "ramina243.firebasestorage.app",
            messagingSenderId: "923144008758",
            appId: "1:923144008758:web:34347eba64da8be4369497"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        let me = null;

        // --- ЭФФЕКТ ПЕЧАТИ ---
        const typeEffect = (text) => {
            let i = 0;
            const el = document.getElementById('typewriter');
            el.innerHTML = "";
            const timer = setInterval(() => {
                if (i < text.length) { el.innerHTML += text.charAt(i); i++; }
                else clearInterval(timer);
            }, 100);
        };

        // --- АВТОРИЗАЦИЯ (REDIRECT) ---
        document.getElementById('loginAction').onclick = () => {
            if (!me) signInWithRedirect(auth, provider);
            else { signOut(auth); location.reload(); }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                me = user;
                document.getElementById('loginAction').innerText = "Выйти";
                document.getElementById('userInfo').innerHTML = `
                    <div class="user-profile">
                        <img src="${user.photoURL}" class="user-avatar">
                        <span style="font-size:12px; font-weight:bold;">${user.displayName}</span>
                    </div>`;
                document.getElementById('composer').style.display = "block";
                typeEffect(`Привет, ${user.displayName.split(' ')[0]}!`);
            }
        });

        // --- ОТПРАВКА ---
        document.getElementById('sendBtn').onclick = async () => {
            const val = document.getElementById('userMsg').value;
            if(!val) return;
            await addDoc(collection(db, "requests"), {
                name: me.displayName,
                pic: me.photoURL,
                text: val,
                likes: 0,
                timestamp: serverTimestamp()
            });
            document.getElementById('userMsg').value = "";
        };

        // --- ЛЕНТА И ПОИСК ---
        const drawFeed = (keyword = "") => {
            const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));
            onSnapshot(q, (snap) => {
                const feed = document.getElementById('feed');
                feed.innerHTML = "";
                snap.forEach(s => {
                    const d = s.data();
                    if (!d.name.toLowerCase().includes(keyword.toLowerCase()) && !d.text.toLowerCase().includes(keyword.toLowerCase())) return;
                    
                    const time = d.timestamp?.toDate().toLocaleTimeString() || "...";
                    feed.innerHTML += `
                        <div class="post-card">
                            <div class="post-info">
                                <img src="${d.pic || 'https://via.placeholder.com/40'}" style="width:40px; height:40px; border-radius:50%;">
                                <div>
                                    <div style="font-weight:bold; color:#d81b60;">${d.name}</div>
                                    <div style="font-size:10px; color:#aaa;">${time}</div>
                                </div>
                            </div>
                            <div class="post-text">${d.text}</div>
                            <div class="like-zone">
                                <button class="heart-btn" onclick="like('${s.id}')">💖 ${d.likes || 0}</button>
                            </div>
                        </div>`;
                });
            });
        };

        window.like = (id) => updateDoc(doc(db, "requests", id), { likes: increment(1) });
        document.getElementById('searchInp').oninput = (e) => drawFeed(e.target.value);

        drawFeed();
    </script>
</body>
</html>
